name: CI-CD SPRING BOOT

on:
  push:
    branches:
      - main
      - dev
      - staging

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: temurin

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Determine environment and image name
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "image_name=tpt2003/chat-task-prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "image_name=tpt2003/chat-task-staging" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "image_name=tpt2003/chat-task-dev" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t ${{ steps.env.outputs.image_name }}:${{ github.sha }} .
          docker tag ${{ steps.env.outputs.image_name }}:${{ github.sha }} ${{ steps.env.outputs.image_name }}:latest

      - name: Push images
        run: |
          docker push ${{ steps.env.outputs.image_name }}:${{ github.sha }}
          docker push ${{ steps.env.outputs.image_name }}:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/') && (github.ref_name == 'main' || github.ref_name == 'dev' || github.ref_name == 'staging')
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine environment and image name
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "image_name=tpt2003/chat-task-prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "env=staging" >> "$GITHUB_OUTPUT"
            echo "image_name=tpt2003/chat-task-staging" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "image_name=tpt2003/chat-task-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker/docker-compose.${{ steps.env.outputs.env }}.yml"
          target: "/home/${{ secrets.VPS_USER }}/app/${{ steps.env.outputs.env }}"

      - name: SSH and deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USER,DOCKERHUB_TOKEN
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}/app/${{ steps.env.outputs.env }}/docker

            # Ghi file .env đúng môi trường
            if [ "${{ steps.env.outputs.env }}" = "prod" ]; then
              echo "${{ secrets.ENV_PROD }}" > .env
            elif [ "${{ steps.env.outputs.env }}" = "staging" ]; then
              echo "${{ secrets.ENV_STAGING }}" > .env
            else
              echo "${{ secrets.ENV_DEV }}" > .env
            fi

            # Đăng nhập Docker Hub để pull image
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin

            # Pull image mới
            docker pull ${{ steps.env.outputs.image_name }}:latest

            # Khởi động services
            docker compose -f docker-compose.${{ steps.env.outputs.env }}.yml up -d
