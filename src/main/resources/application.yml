spring:
  application:
    name: chat-task

  datasource:
    url: jdbc:postgresql://localhost:5432/capstone_chat_task
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect