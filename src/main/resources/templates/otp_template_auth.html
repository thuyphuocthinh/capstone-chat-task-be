<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px;">
<table style="max-width: 600px; margin: auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding: 30px;">
    <tr>
        <td style="text-align: center;">
            <h2 style="color: #333;">🔐 OTP Verification</h2>
        </td>
    </tr>
    <tr>
        <td>
            <p>Hello,</p>
            <p>Your OTP for verification is:</p>
            <p style="font-size: 24px; font-weight: bold; color: #2a9d8f; text-align: center; margin: 20px 0;">
                {{OTP}}
            </p>
            <p style="text-align: center;">
                <a href="http://localhost:8080/api/v1/auth/verify-email?otp={{OTP}}" target="_blank"
                   style="display: inline-block; background-color: #2a9d8f; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 5px;">
                    Verify Email
                </a>
            </p>
            <p>This OTP will expire in 5 minutes.</p>
            <p>If you did not request this, please ignore this message.</p>
            <br>
            <p>Best regards,<br><strong>Your Company</strong></p>
        </td>
    </tr>
</table>
</body>
</html>
